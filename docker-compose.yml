# docker-compose.yml
# Production-grade multi-container orchestration
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persistent download storage on host
      - ../plex/media/Music:/downloads
      # Persistent database and cookie storage
      - backend-data:/app/data
    networks:
      - ytm-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Pass API URLs as build-time args so React bakes them in
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-https://backend.ytd.zandercs.com}
        - REACT_APP_WS_URL=${REACT_APP_WS_URL:-wss://backend.ytd.zandercs.com/ws}
    container_name: ytm-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ytm-network

networks:
  ytm-network:
    driver: bridge

volumes:
  # Named volume so database & cookies survive container recreations
  backend-data:
